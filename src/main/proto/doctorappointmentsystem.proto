syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.doctorappointment";
option java_outer_classname = "Doctorappointmentsystem";
option objc_class_prefix = "HLW";

package com.doctorappointment;

service DoctorappointmentsystemService {
  rpc send (DoctorappointmentsystemRequest) returns (DoctorappointmentsystemReply) {}
}

message DoctorappointmentsystemRequest {
  string name = 1;
}

message DoctorappointmentsystemReply {
  string message = 1;
}