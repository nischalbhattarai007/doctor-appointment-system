syntax = "proto3";//protobuf syntax

option java_multiple_files = true; //generate separate java files per message/service
option java_package = "com.doctorappointment"; // package name
option java_outer_classname = "DoctorProto"; //outer wrapper class name
option objc_class_prefix = "HLW"; //used in macOs or apple. to generate code in many language
/*
    prefix for objective C
    objective c doesn't have proper package namespaces like java
    objective c classes are global.
    so if two libraries both create same name they conflict.
    to avoid this prefixes are added
*/

package com.doctorappointment;

service DoctorService{
  rpc DoctorLogin(DoctorLoginRequest) returns (DoctorLoginResponse);
  rpc RegisterDoctor(RegisterDoctorRequest) returns (RegisterDoctorResponse);
  rpc GetDoctorById(GetDoctorByIdRequest) returns (GetDoctorByIdResponse);
  rpc DeleteDoctorById(GetDoctorByIdRequest) returns(DeleteDoctorResponse);
  rpc GetDoctorByEmail(GetByDoctorEmailRequest) returns(GetByDoctorEmailResponse);
  rpc UpdateDoctorById(UpdateDoctorRequest) returns (UpdateDoctorResponse);
  rpc GetDoctorsByLocation(LocationRequest) returns (DoctorListResponse);
  rpc GetDoctorAvailability(DoctorAvailabilityRequest) returns (DoctorAvailabilityResponse);
  rpc GetNearestDoctor(NearestLocationRequest) returns (NearestDoctorListResponse);
  rpc SetDoctorSchedule(SetScheduleRequest) returns (SetScheduleResponse);
  rpc GetDoctorSchedule(GetScheduleRequest) returns (GetScheduleResponse);
  rpc GetAllDoctorList(EmptyList) returns (DoctorList);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
}
//login request
message DoctorLoginRequest{
  string doctor_email = 1;
  string password = 2;
}
//login response
message DoctorLoginResponse{
  //previously there are the details of doctor
  reserved 2;
  reserved 3;
  reserved 4;
  reserved 5;
  reserved 6;
  reserved 7;
  reserved 8;
  string doctor_id = 1;
  string token=9;
  string refresh_token=10;
}
//register doctor
message RegisterDoctorRequest{
  string doctor_first_name = 1;
  string doctor_last_name = 2;
  string doctor_email = 3;
  string password = 4;
  string doctor_phone_number = 5;
  string doctor_address = 6;
  string specialization = 7;
  string street=8;
  string area=9;
  string city=10;
  string clinic_name = 11;
  string clinic_building= 12;
}
//register response
message RegisterDoctorResponse{
  reserved 15;//previously used for doctor_status
  string doctor_id = 1;
  string doctor_first_name = 2;
  string doctor_last_name = 3;
  string doctor_email = 4;
  string doctor_phone_number = 5;
  string doctor_address = 6;
  string specialization = 7;
  string street=8;
  string area=9;
  string city=10;
  double latitude = 11;
  double longitude = 12;
  string clinic_name=13;
  string clinic_building=14;
  string doctor_message = 16;

}
//get by id
message GetDoctorByIdRequest{
  string doctor_id = 1;
}
//get by id response
message GetDoctorByIdResponse{
  string doctor_id = 1;
  string doctor_first_name = 2;
  string doctor_last_name = 3;
  string doctor_email = 4;
  string doctor_phone_number = 5;
  string doctor_address = 6;
  string specialization = 7;
  string street=8;
  string area=9;
  string city=10;
  double latitude = 11;
  double longitude = 12;
  string clinic_name=13;
  string clinic_building=14;
  string doctor_status = 15;
  string doctor_message = 16;
}
//delete doctor by id response
message DeleteDoctorResponse{
  string doctor_id = 1;
  string doctor_status = 2;
  string doctor_message = 3;
}
//get doctor by doctor_email
//get by id
message GetByDoctorEmailRequest{
  string doctor_email = 1;
}
//get by id response
message GetByDoctorEmailResponse{
  string doctor_id = 1;
  string doctor_first_name = 2;
  string doctor_last_name = 3;
  string doctor_email = 4;
  string doctor_phone_number = 5;
  string doctor_address = 6;
  string specialization = 7;
  string street=8;
  string area=9;
  string city=10;
  double latitude = 11;
  double longitude = 12;
  string clinic_name=13;
  string clinic_building=14;
  string doctor_status = 15;
  string doctor_message = 16;
}
//update doctor by Id
message UpdateDoctorRequest{
  string doctor_first_name = 1;
  string doctor_last_name = 2;
  string doctor_phone_number = 3;
  string doctor_address = 4;
  string specialization = 5;
  string street=6;
  string area=7;
  string city=8;
  int32 daily_limit = 9;
  string clinic_name = 10;
  string clinic_building = 11;
}
//update doctor by Id response
message UpdateDoctorResponse{
  string doctor_id = 1;
  string doctor_first_name = 2;
  string doctor_last_name = 3;
  string doctor_email = 4;
  string doctor_phone_number = 5;
  string doctor_address = 6;
  string specialization = 7;
  string street=8;
  string area=9;
  string city=10;
  double latitude = 11;
  double longitude = 12;
  string clinic_name = 13;
  string clinic_building = 14;
  string doctor_status = 15;
  string doctor_message = 16;
  int32 daily_limit=17;
}
// get doctor by location
message LocationRequest{
  string location_name = 1;
  double radius_km = 2;
  int32 limit = 3;
}
//doctor list response
message DoctorListResponse {
  repeated DoctorSummary doctors = 1;
  string doctor_status = 2;
  string doctor_message = 3;
}
//doctor list summary
message DoctorSummary {
  string doctor_id = 1;
  string doctor_first_name = 2;
  string doctor_last_name = 3;
  string specialization = 4;
  double distance_km = 5;
  string doctor_phone_number = 7;
  string street=8;
  string area=9;
  string city=10;
}
//doctor availability
message DoctorAvailabilityRequest {
  string doctor_id = 1;
  string date = 2;  // format: YYYY-MM-DD
}
//doctor availability response
message DoctorAvailabilityResponse {
  string doctor_id = 1;
  string date = 2; // format: YYYY-MM-DD
  bool   is_available = 3;
  int32  booked_count = 4;
  int32  max_capacity = 5;
  string doctor_status = 6;
  string doctor_message = 7;
}
//get doctor with nearest location
message NearestLocationRequest{
  string location_name = 1;
  double radius_km = 2;
  int32 limit = 3;
}
//nearest location response
message NearestDoctorListResponse {
  repeated DoctorSummary doctors = 1;
  string doctor_status = 2;
  string doctor_message = 3;
}

message SetScheduleRequest {
  string doctor_id = 1;
  repeated string working_days = 2;  // ["MONDAY", "WEDNESDAY", "FRIDAY"]
}

message SetScheduleResponse {
  string doctor_id = 1;
  repeated string working_days = 2;
  string status = 5;
  string message = 6;
}

// Get doctor schedule
message GetScheduleRequest {
  string doctor_id = 1;
}

message GetScheduleResponse {
  string doctor_id = 1;
  repeated string working_days = 2;
  string status = 5;
  string message = 6;
}

//get all doctors
message EmptyList{

}
message DoctorList{
  repeated DoctorResponse doctors=1;
}
//doctor list response
message DoctorResponse{
  string doctor_id = 1;
  string doctor_first_name = 2;
  string doctor_last_name = 3;
  string specialization = 4;
  string street=5;
  string area=6;
  string city=7;
  string doctor_phone_number = 8;
  string clinic_building= 9;
  string clinic_name = 10;
  string doctor_email=11;
}
message RefreshTokenRequest{
  string refresh_token=1;
}
message RefreshTokenResponse{
  string token=1;
  string refresh_token=2;
}

