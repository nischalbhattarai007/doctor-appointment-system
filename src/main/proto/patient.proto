syntax = "proto3";
option java_multiple_files = true;
option java_package = "com.doctorappointment";
option java_outer_classname = "PatientProto";
option objc_class_prefix = "HLW";

package com.doctorappointment;

service PatientService {
  rpc Login(LoginRequest)returns(LoginResponse);
  rpc RegisterPatient(RegisterPatientRequest)returns(PatientResponse);
  rpc GetPatientById(GetByIdRequest)returns(GetByIdResponse);
  rpc UpdatePatient(UpdatePatientRequest)returns(UpdatePatientResponse);
  rpc DeletePatient(GetByIdRequest)returns(DeletePatientResponse);
  rpc GetNearestDoctors(NearestDoctorsRequest)returns (DoctorListResponse);
  rpc GetDoctorsByLocation(LocationRequest)returns(DoctorListResponse);
  rpc GetDoctorAvailability(DoctorAvailabilityRequest)returns(DoctorAvailabilityResponse);
  rpc RequestAppointment(AppointmentRequest)returns(AppointmentResponse);
  rpc CancelAppointment(CancelAppointmentRequest)returns(AppointmentResponse);
}

// Auth

message LoginRequest {
  string email    = 1;
  string password = 2;
}

message LoginResponse {
  string patient_id   = 1;
  string first_name   = 2;
  string last_name    = 3;
  string email        = 4;
  string phone_number = 5;
  string address      = 6;
  string status       = 7;
  string message      = 8;
}

//  Patient register

message RegisterPatientRequest {
  string first_name   = 1;
  string last_name    = 2;
  string email        = 3;
  string password     = 4;
  string phone_number = 5;
  string address      = 6;
}

message PatientResponse {
  string patient_id   = 1;
  string first_name   = 2;
  string last_name    = 3;
  string email        = 4;
  string phone_number = 5;
  string address      = 6;
  string status       = 7;
  string message      = 8;
}

//get patient by id
message GetByIdRequest {
  string patient_id = 1;
}

message GetByIdResponse {
  string patient_id   = 1;
  string first_name   = 2;
  string last_name    = 3;
  string email        = 4;
  string phone_number = 5;
  string address      = 6;
  string status       = 7;
  string message      = 8;
}

message DeletePatientResponse{
  string patient_id=1;
  string status=2;
  string message=3;
}

//update patient
message UpdatePatientRequest {
  string patient_id   = 1;
  string first_name   = 2;
  string last_name    = 3;
  string phone_number = 4;
  string address      = 5;
}

message UpdatePatientResponse {
  string patient_id   = 1;
  string first_name   = 2;
  string last_name    = 3;
  string email        = 4;
  string phone_number = 5;
  string address      = 6;
  string status       = 7;
  string message      = 8;
}

//doctor

// Used for GetDoctorsByLocation (filter by radius)
message LocationRequest {
  double latitude  = 1;
  double longitude = 2;
  double radius_km = 3;
}

// Used for GetNearestDoctors (sort by distance, radius optional)
message NearestDoctorsRequest {
  double latitude  = 1;
  double longitude = 2;
  double radius_km = 3;  // optional upper bound
  int32  limit     = 4;  // max number of doctors to return
}

message DoctorListResponse {
  repeated DoctorSummary doctors = 1;
  string status                  = 2;
  string message                 = 3;
}

message DoctorSummary {
  string doctor_id      = 1;
  string first_name     = 2;
  string last_name      = 3;
  string specialization = 4;
  double distance_km    = 5;
  string clinic_address = 6;
  string phone_number   = 7;
}

//Availability

message DoctorAvailabilityRequest {
  string doctor_id = 1;
  string date      = 2;  // format: YYYY-MM-DD
}

message DoctorAvailabilityResponse {
  string          doctor_id       = 1;
  string          date            = 2;  // format: YYYY-MM-DD
  bool            is_available    = 3;
  repeated string available_slots = 4;  // e.g. ["09:00", "10:00", "14:30"]
  string          status          = 5;
  string          message         = 6;
}

//  Appointment

message AppointmentRequest {
  string patient_id = 1;
  string doctor_id  = 2;
  string date       = 3;  // format: YYYY-MM-DD
}

message CancelAppointmentRequest {
  string appointment_id = 1;
  string patient_id     = 2;
}

message AppointmentResponse {
  string appointment_id = 1;
  string patient_id     = 2;
  string doctor_id      = 3;
  string date           = 4;  // format: YYYY-MM-DD
  string status         = 5;  // CONFIRMED, CANCELLED, REJECTED
  string message        = 6;
}
