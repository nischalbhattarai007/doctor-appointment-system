syntax = "proto3";
option java_multiple_files = true;
option java_package = "com.doctorappointment";
option java_outer_classname = "PatientProto";
option objc_class_prefix = "HLW";

package com.doctorappointment;

service PatientService {
  rpc Login(LoginRequest)returns(LoginResponse);
  rpc RegisterPatient(RegisterPatientRequest)returns(PatientResponse);
  rpc GetPatientById(GetByIdRequest)returns(GetByIdResponse);
  rpc GetPatientByEmail(GetByEmailRequest) returns (GetByEmailResponse);
  rpc UpdatePatient(UpdatePatientRequest)returns(UpdatePatientResponse);
  rpc DeletePatient(GetByIdRequest)returns(DeletePatientResponse);
  rpc GetAllPatient(Empty) returns (stream PatientListResponse);
  rpc RefreshTokens(RefreshTokenRequests) returns (RefreshTokenResponses);
}

// Auth

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string patient_id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string phone_number = 5;
  string address = 6;
  string status = 7;
  string message = 8;
  string token=9;
  string refresh_token=10;
}

//  Patient register

message RegisterPatientRequest {
  string first_name = 1;
  string last_name = 2;
  string email = 3;
  string password = 4;
  string phone_number = 5;
  string address = 6;
}

message PatientResponse {
  string patient_id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string phone_number = 5;
  string address = 6;
  string status = 7;
  string message = 8;
}

//get patient by id
message GetByIdRequest {
  string patient_id = 1;
}

message GetByIdResponse {
  string patient_id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string phone_number = 5;
  string address = 6;
  string status = 7;
  string message = 8;
}

message DeletePatientResponse{
  string patient_id = 1;
  string status = 2;
  string message = 3;
}

//update patient
message UpdatePatientRequest {
  string patient_id = 1;
  string first_name = 2;
  string last_name = 3;
  string phone_number = 4;
  string address = 5;
  string email=6;
}

message UpdatePatientResponse {
  string patient_id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string phone_number = 5;
  string address = 6;
  string status = 7;
  string message = 8;
}
//get patients by email
message GetByEmailRequest{
  string email = 1;
}
message GetByEmailResponse{
  string patient_id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string phone_number = 5;
  string address = 6;
  string status = 7;
  string message = 8;
}

//  Appointment

message AppointmentRequest {
  string patient_id = 1;
  string doctor_id = 2;
  string date = 3;  // format: YYYY-MM-DD
}

message CancelAppointmentRequest {
  string appointment_id = 1;
  string patient_id = 2;
}

message AppointmentResponse {
  string appointment_id = 1;
  string patient_id = 2;
  string doctor_id = 3;
  string date = 4;  // format: YYYY-MM-DD
  string status = 5;  // CONFIRMED, CANCELLED, REJECTED
  string message = 6;
}
message Empty{}
message PatientListResponse{
  string patient_id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string phone_number = 5;
  string address = 6;
}
message RefreshTokenRequests{
  string refresh_token=1;
}
message RefreshTokenResponses{
  string token=1;
  string refresh_token=2;
}